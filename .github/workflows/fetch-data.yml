name: Fetch Eisbach data

# Holt alle 15 Minuten die Quelldaten (HND/GKD/Open-Meteo), normalisiert sie zu JSON
# und veröffentlicht NUR current.json + history.json + archive.json im `data`-Branch.
#
# Wichtig für Kosten/Wartung: Dieser Job baut die App NICHT neu. Der `data`-Branch wird
# als kompakter Single-Commit force-gepusht (bleibt winzig). Die laufende Historie wird
# vorher aus dem `data`-Branch gelesen und vom Skript fortgeschrieben (idempotent).

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Code/Skript)
        uses: actions/checkout@v6

      - name: Vorhandenen data-Branch auschecken (falls vorhanden)
        uses: actions/checkout@v6
        with:
          ref: data
          path: data-branch
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bisherige Daten als Ausgangspunkt übernehmen
        run: |
          mkdir -p public/data
          cp data-branch/current.json public/data/ 2>/dev/null || true
          cp data-branch/history.json public/data/ 2>/dev/null || true
          cp data-branch/archive.json public/data/ 2>/dev/null || true
          cp data-branch/news.json public/data/ 2>/dev/null || true

      - name: Quellen abrufen & normalisieren
        run: python3 scripts/fetch_data.py

      # News-Feeds prüfen — das Skript drosselt sich selbst auf ~1× täglich
      # (überspringt, wenn news.json jünger als 20 h ist).
      - name: News-Feeds prüfen
        run: python3 scripts/fetch_news.py
        continue-on-error: true

      - name: In data-Branch veröffentlichen
        run: |
          out=$(mktemp -d)
          cp public/data/current.json public/data/history.json "$out/"
          cp public/data/archive.json "$out/" 2>/dev/null || true
          cp public/data/news.json "$out/" 2>/dev/null || true
          cd "$out"
          git init -q -b data
          git add current.json history.json
          git add archive.json 2>/dev/null || true
          git add news.json 2>/dev/null || true
          git -c user.name="eisbach-bot" \
              -c user.email="bot@users.noreply.github.com" \
              commit -q -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -q --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data
