name: Deploy to GitHub Pages

# Baut die statische App und veröffentlicht sie auf GitHub Pages.
# Läuft bei Push auf main sowie nach erfolgreichem Daten-Update.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Basis-Pfad = Repo-Name (Project Pages), z. B. "/eisbachwelle/".
          BASE_PATH: "/${{ github.event.repository.name }}/"
          # Produktion liest die Live-Daten aus dem data-Branch (kein Rebuild bei Updates).
          VITE_DATA_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/data/"
          # Quellcode-Link leitet sich aus dem Repo ab → übersteht Umbenennen ohne Code-Änderung.
          VITE_REPO_URL: "https://github.com/${{ github.repository }}"
          # Near-Live: Repo-Variable LIVE_URL (Settings → Variables) = Cloudflare-Worker-URL.
          # Leer gelassen → App nutzt nur die Cron-Daten.
          VITE_LIVE_URL: "${{ vars.LIVE_URL }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
