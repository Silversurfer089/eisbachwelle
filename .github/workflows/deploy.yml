name: Deploy to GitHub Pages

# Baut die statische App und veröffentlicht sie auf GitHub Pages.
# Läuft bei Push auf main sowie nach erfolgreichem Daten-Update.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        # BASE_PATH muss dem Repo-Namen entsprechen, z. B. "/eisbachwelle/".
        # Wird in M8 final gesetzt; ${{ github.event.repository.name }} leitet ihn ab.
        run: npm run build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
