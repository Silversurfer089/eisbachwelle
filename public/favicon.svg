<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Eisbachwelle">
  <defs>
    <!-- Schachbrett (Karo): Türkis-Grund mit Creme-Feldern -->
    <pattern id="karo" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#2dd4bf" />
      <rect width="12" height="12" fill="#eef1e6" />
      <rect x="12" y="12" width="12" height="12" fill="#eef1e6" />
    </pattern>
    <!-- Wellen-/Zeltform -->
    <clipPath id="welle">
      <path d="M12 86 C 30 78, 40 50, 50 40 Q60 31 70 40 C 80 50, 90 78, 108 86 Z" />
    </clipPath>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0e1418" />
  <g clip-path="url(#welle)">
    <rect x="0" y="22" width="120" height="66" fill="url(#karo)" />
  </g>
</svg>
