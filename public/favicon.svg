<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eisbachwelle">
  <defs>
    <pattern id="karo" width="128" height="128" patternUnits="userSpaceOnUse">
      <rect width="128" height="128" fill="#FFF4E0"/>            <!-- Creme -->
      <rect width="64" height="64" fill="#15C2B8"/>              <!-- Türkis -->
      <rect x="64" y="64" width="64" height="64" fill="#15C2B8"/>
    </pattern>
  </defs>

  <!-- Hintergrund-Kachel (Nachtblau) -->
  <rect width="512" height="512" rx="112" fill="#1A1A2E"/>

  <!-- Welle mit Schachbrett-Füllung und cremefarbener Kontur -->
  <path d="M92 366 L92 300 C176 300 220 268 270 206 C296 174 314 164 340 164
           C388 164 416 212 420 300 L420 366 Z"
        fill="url(#karo)" stroke="#FFF4E0" stroke-width="14" stroke-linejoin="round"/>
</svg>
